name: Deploy Zensical site to Pages

on:
  push:
    branches:
      - main  # Cambia a "master" si tu rama principal se llama así

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Versión recomendada de Node para entornos estáticos

      - name: Install Zensical
        run: npm install -g zensical

      - name: Build static site with Zensical
        run: zensical build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site' # Carpeta donde Zensical genera la web estática

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
