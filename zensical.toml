[project]
site_name = "ASO Administración de Sistemas Operativos"
site_url = "https://joseramonIESMZ.github.io/ASO"
docs_dir = "docs"
use_directory_urls = true

extra_css = [
  "stylesheets/extra.css"
]

nav = [
  { "Inicio" = "index.md" },

  { "Windows Server" = [
    { "Fundamentos de Administración de Windows Server" = "apuntes/windows-server/fundamentos-core.md" },
    { "Instalación de Windows Server" = "apuntes/windows-server/instalacion-windows-server.md" },
    { "Administración Remota (WinRM)" = "apuntes/windows-server/administracion-remota.md" },
    { "Supervisión y mantenimiento" = "apuntes/windows-server/supervision-mantenimiento.md" },
    { "Programación de tareas" = "apuntes/windows-server/programacion-tareas.md" }
  ] },

  { "Linux" = [
  { "Fundamentos de Administración de Linux" = "apuntes/linux/fundamentos-core.md" },
  { "Administración Remota (SSH)" = "apuntes/linux/administracion-remota-ssh.md" },
  { "Supervisión y mantenimiento" = "apuntes/linux/supervision-mantenimiento.md" },
  { "Programación de tareas" = "apuntes/linux/programacion-tareas.md" }
] },

{ "Active Directory" = [
  { "Fundamentos de Active Directory" = "apuntes/active-directory/fundamentos-ad-core.md" },
  { "Implementación de Active Directory" = "apuntes/active-directory/implementacion-ad.md" },
  { "Administración de Active Directory" = "apuntes/active-directory/administracion-ad.md" },
  { "Filtros y búsquedas avanzadas" = "apuntes/active-directory/filtros-busquedas-avanzadas.md" },
  { "Políticas de Grupo (GPO)" = "apuntes/active-directory/politicas-gpo.md" }
] },

{ "PowerShell" = [
  { "Fundamentos de PowerShell" = "apuntes/powershell/fundamentos-powershell-core.md" }
] },

{ "Bash Scripting" = [
  { "Fundamentos y Variables" = "apuntes/bash/bash-fundamentos.md" },
  { "Parámetros Posicionales" = "apuntes/bash/bash-parametros.md" },
  { "Condicionales (if/case)" = "apuntes/bash/bash-condicionales.md" },
  { "Bucles y Repetición" = "apuntes/bash/bash-bucles.md" },
  { "Funciones en Bash" = "apuntes/bash/bash-funciones.md" },
  { "Laboratorio de Desafíos" = "apuntes/bash/bash-troubleshooting.md" }
] },

{ "Samba" = [
  { "Fundamentos de Samba" = "apuntes/samba/fundamentos-samba-core.md" },
  { "Implementación de Samba" = "apuntes/samba/implementacion-samba.md" },
  { "Administración de Samba" = "apuntes/samba/administracion-samba.md" }
] },

{ "Proxmox" = [
  { "Fundamentos de Proxmox" = "apuntes/proxmox/fundamentos-proxmox.md" },
  { "Implementación de Proxmox" = "apuntes/proxmox/implementacion-proxmox.md" },
  { "Administración de Proxmox" = "apuntes/proxmox/administracion-proxmox.md" }
] }

]

[project.theme]
variant = "classic"
language = "es"
custom_dir = "overrides"

features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "content.code.copy",
  "search.highlight",
  "navigation.sticky",
  "navigation.top"
]

[project.markdown_extensions]
admonition = {}
"markdown.extensions.md_in_html" = {}
"pymdownx.details" = {}
"pymdownx.inlinehilite" = {}

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]